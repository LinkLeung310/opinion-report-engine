services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opinion_fixture
      POSTGRES_USER: report
      POSTGRES_PASSWORD: report_local_only
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U report -d opinion_fixture"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - fixture-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro

volumes:
  fixture-data:
