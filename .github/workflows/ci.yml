name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python 3.12 / PostgreSQL fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Start fixture PostgreSQL
        run: docker compose -f fixtures/docker-compose.yml up -d --wait

      - name: Run test suite
        env:
          PG_DSN: postgresql://report:report_local_only@localhost:55432/opinion_fixture
        run: python -m pytest

      - name: Stop fixture PostgreSQL
        if: always()
        run: docker compose -f fixtures/docker-compose.yml down -v
